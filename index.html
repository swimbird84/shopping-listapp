<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="100">
      <button id="addBtn" title="추가">+</button>
    </div>
    <div class="stats">
      <span id="statsText"></span>
      <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>
    <ul id="list"></ul>
    <div class="empty" id="emptyMsg" style="display:none">리스트가 비어 있습니다.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
