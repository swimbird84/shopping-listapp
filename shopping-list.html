<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 12px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: background 0.15s;
    }

    li.checked {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #1e293b;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #ef4444;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="100">
      <button id="addBtn" title="추가">+</button>
    </div>
    <div class="stats">
      <span id="statsText"></span>
      <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>
    <ul id="list"></ul>
    <div class="empty" id="emptyMsg" style="display:none">리스트가 비어 있습니다.</div>
  </div>

  <script>
    (() => {
      let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

      const listEl    = document.getElementById('list');
      const emptyMsg  = document.getElementById('emptyMsg');
      const statsText = document.getElementById('statsText');
      const itemInput = document.getElementById('itemInput');

      function save() {
        localStorage.setItem('shoppingList', JSON.stringify(items));
      }

      function createListItem(item, i) {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggleItem(i));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.title = '삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deleteItem(i));

        li.append(checkbox, span, delBtn);
        return li;
      }

      function render() {
        listEl.innerHTML = '';

        if (items.length === 0) {
          emptyMsg.style.display = 'block';
        } else {
          emptyMsg.style.display = 'none';
          const fragment = document.createDocumentFragment();
          items.forEach((item, i) => fragment.appendChild(createListItem(item, i)));
          listEl.appendChild(fragment);
        }

        const total = items.length;
        const done  = items.filter(item => item.checked).length;
        statsText.textContent = total > 0 ? `${done} / ${total} 완료` : '';
      }

      function addItem() {
        const text = itemInput.value.trim();
        if (!text) return;
        items.push({ text, checked: false });
        save();
        render();
        itemInput.value = '';
        itemInput.focus();
      }

      function deleteItem(i) {
        items.splice(i, 1);
        save();
        render();
      }

      function toggleItem(i) {
        items[i].checked = !items[i].checked;
        save();
        render();
      }

      function clearChecked() {
        items = items.filter(item => !item.checked);
        save();
        render();
      }

      document.getElementById('addBtn').addEventListener('click', addItem);
      document.getElementById('clearBtn').addEventListener('click', clearChecked);
      itemInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') addItem();
      });

      render();
    })();
  </script>
</body>
</html>
